name: CD

on:
  pull_request:
    branches:
      - main
  release:
    types:
      - published

concurrency:
  group: cd-${{ github.event_name }}-${{ github.event.pull_request.number || github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  deploy-preview:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
      pull-requests: write
    environment:
      name: staging
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.3.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build for Cloudflare Workers
        run: pnpm --filter @appstarter/web build

      # ponytail: relies on wrangler's native `preview_urls` (wrangler.jsonc) instead of a
      # hand-rolled per-PR worker; each version upload gets its own short-lived preview URL.
      - name: Upload PR preview version
        id: deploy
        working-directory: apps/web
        run: |
          OUTPUT=$(pnpm exec wrangler versions upload --env preview --message "PR #${{ github.event.pull_request.number }}")
          echo "$OUTPUT"
          URL=$(echo "$OUTPUT" | grep -oE 'https://[^ ]+\.workers\.dev' | head -n1)
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Comment preview URL on PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BODY="Preview: ${{ steps.deploy.outputs.url }}"
          gh pr comment "${{ github.event.pull_request.number }}" --body "$BODY" --edit-last \
            || gh pr comment "${{ github.event.pull_request.number }}" --body "$BODY"

  deploy-production:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    environment:
      name: production
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - uses: pnpm/action-setup@v4
        with:
          version: 11.3.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build for Cloudflare Workers
        run: pnpm --filter @appstarter/web build

      - name: Deploy to production worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/web
          command: deploy --env production
